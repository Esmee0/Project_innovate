{% extends "base.html" %}

{% block title %}New assignment{% endblock %}

{% block content %}
  <h1>New assignment</h1>
  <p class="muted">Fill in the details and click save.</p>

  <form method="post">
    <p>
      <label>Title<br>
        <input type="text" name="title" required>
      </label>
    </p>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <p>
        <label>Start date<br>
          <input type="date" name="start_date" required>
        </label>
      </p>

      <p>
        <label>Due date<br>
          <input type="date" name="due_date" required>
        </label>
      </p>
    </div>

    <p>
      <label>Total hours needed<br>
        <input type="number" name="total_hours" step="0.5" min="0" required>
      </label>
    </p>

    <div class="actions">
      <button class="btn btn-primary" type="submit">Save</button>
      <a class="btn" href="{{ url_for('dashboard') }}">Back to dashboard</a>
    </div>
  </form>
{% endblock %}
