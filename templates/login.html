{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
  <div class="auth-wrap">
    <div class="auth-card">
      <h1 style="margin-top:0;">Login</h1>
      <p class="muted">Log in to view your dashboard.</p>

      <form method="post">
        <p>
          <label>Username<br>
            <input type="text" name="username" required>
          </label>
        </p>

        <p>
          <label>Password<br>
            <input type="password" name="password" required>
          </label>
        </p>

        <div class="actions">
          <button class="btn btn-primary" type="submit">Login</button>
          <a class="btn" href="{{ url_for('register') }}">Register</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
